openapi: "3.0.3"
info:
  title: Pollen Tracker API
  version: "1.0.0"
  description: 花粉飛散量とアレルギー症状を記録・可視化する API

servers:
  - url: http://localhost:18080
    description: Local development

security:
  - ApiKeyAuth: []

paths:
  /health:
    $ref: "./paths/health.yaml"
  /pollens:
    $ref: "./paths/pollen.yaml"
  /stats:
    $ref: "./paths/stats.yaml#/stats"
  /symptoms:
    $ref: "./paths/symptoms.yaml#/symptoms"
  /symptoms/{id}:
    $ref: "./paths/symptoms.yaml#/symptomsId"

components:
  securitySchemes:
    ApiKeyAuth:
      $ref: "./components/security.yaml#/ApiKeyAuth"
