openapi: 3.0.3
info:
  title: Pollen Tracker API
  version: 1.0.0
  description: 花粉飛散量とアレルギー症状を記録・可視化する API
servers:
  - url: http://localhost:18080
    description: Local development
security:
  - ApiKeyAuth: []
paths:
  /health:
    get:
      summary: ヘルスチェック
      description: |-
        - サービスの稼働状態を確認する
        - 認証不要で呼び出し可能
        - ロードバランサーや監視ツールからの死活監視に使用する
      operationId: GetHealth
      security: []
      responses:
        '200':
          description: サービス稼働中
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              example:
                error: Internal server error
                code: INTERNAL_SERVER_ERROR
  /pollens:
    get:
      summary: 指定座標の花粉レベルを取得する
      description: |-
        - 緯度・経度をもとに Google Pollen API を呼び出し、指定日の花粉レベル (1〜5) を返す
        - date を省略した場合は当日のデータを返す
        - 現在シーズンのメイン花粉種と season_info (ピーク期間・特徴・飛散地域) も合わせて返す
        - forecast には指定日の翌日以降 (最大 4 日分) の花粉予報を含む
      operationId: GetPollen
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            format: double
          description: '緯度 (例: 35.7122)'
        - name: lng
          in: query
          required: true
          schema:
            type: number
            format: double
          description: '経度 (例: 139.7811)'
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
          description: 取得日 (YYYY-MM-DD)。省略時は当日
      responses:
        '200':
          description: 花粉レベルの取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollenResponse'
              example:
                date: '2026-06-14'
                level: 2
                pollen_type: GRASS
                season_info:
                  peak: 5月〜10月
                  characteristics: くしゃみ・鼻水・目のかゆみ
                  region: 全国
                forecast:
                  - date: '2026-06-15'
                    level: 3
                  - date: '2026-06-16'
                    level: 2
                  - date: '2026-06-17'
                    level: 1
                  - date: '2026-06-18'
                    level: 1
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              example:
                error: Invalid query parameter
                code: BAD_REQUEST
        '500':
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              example:
                error: Internal server error
                code: INTERNAL_SERVER_ERROR
  /stats:
    get:
      summary: 症状・花粉レベルの集計データを取得する
      description: |-
        - period に応じて週次または月次の集計データを返す
        - 各期間の平均くしゃみ・鼻水・目のかゆみ強度と平均花粉レベルを含む
        - from を省略すると当日から 30 日前、to を省略すると当日を終端とする
      operationId: GetStats
      parameters:
        - name: period
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/StatsPeriod'
          description: 集計単位 (weekly または monthly)
          example: weekly
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
          description: 集計開始日 (YYYY-MM-DD)。省略時は 30 日前
          example: '2026-06-01'
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
          description: 集計終了日 (YYYY-MM-DD)。省略時は当日
          example: '2026-06-14'
      responses:
        '200':
          description: 集計データの取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsResponse'
              example:
                period: weekly
                items:
                  - start_date: '2026-06-08'
                    end_date: '2026-06-14'
                    avg_sneezing: 2.5
                    avg_runny: 3
                    avg_itchy: 2
                    avg_pollen_level: 3.5
                    count: 5
                  - start_date: '2026-06-01'
                    end_date: '2026-06-07'
                    avg_sneezing: 1.5
                    avg_runny: 2
                    avg_itchy: 1.5
                    avg_pollen_level: 2
                    count: 4
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              example:
                error: Invalid query parameter
                code: BAD_REQUEST
        '500':
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              example:
                error: Internal server error
                code: INTERNAL_SERVER_ERROR
  /symptoms:
    get:
      summary: 症状ログを一覧取得する
      description: |-
        - from〜to で指定した期間の症状ログを配列で返す
        - from を省略すると当日から 30 日前、to を省略すると当日を終端とする
        - レスポンスには items (ログ配列) と total (総件数) が含まれる
      operationId: GetSymptoms
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
          description: 取得開始日 (YYYY-MM-DD)。省略時は 30 日前
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
          description: 取得終了日 (YYYY-MM-DD)。省略時は当日
      responses:
        '200':
          description: 症状ログ一覧の取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SymptomsListResponse'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              example:
                error: Invalid query parameter
                code: BAD_REQUEST
        '500':
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              example:
                error: Internal server error
                code: INTERNAL_SERVER_ERROR
    post:
      summary: 症状ログを保存する
      description: |-
        - 指定日のくしゃみ・鼻水・目のかゆみの強度 (1〜5) と花粉レベルを記録する
        - 同日付のレコードが既に存在する場合は 409 を返す
        - took_medication は省略時 false、note は省略時空文字列をデフォルト値として送信する
      operationId: CreateSymptoms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SymptomRequest'
      responses:
        '201':
          description: 症状ログの保存成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SymptomResponse'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              example:
                error: Invalid request body
                code: BAD_REQUEST
        '409':
          description: 同日付のレコードが既に存在する
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
              example:
                error: Symptom log for this date already exists
                code: CONFLICT
        '500':
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              example:
                error: Internal server error
                code: INTERNAL_SERVER_ERROR
  /symptoms/{id}:
    get:
      summary: 症状ログを取得する
      description: |-
        - パスパラメーターで指定した UUID の症状ログを 1 件返す
        - 指定 UUID のログが存在しない場合は 404 を返す
      operationId: GetSymptomsId
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: 取得対象の症状ログ ID (UUID v7)
      responses:
        '200':
          description: 症状ログの取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SymptomResponse'
        '404':
          description: 指定 UUID の症状ログが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
              example:
                error: Symptom log not found
                code: NOT_FOUND
        '500':
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              example:
                error: Internal server error
                code: INTERNAL_SERVER_ERROR
    put:
      summary: 症状ログを更新する
      description: |-
        - パスパラメーターで指定した UUID の症状ログを全フィールド上書き更新する
        - リクエストボディの全フィールドが必須で、送信された値でそのまま上書きされる
        - 指定 UUID のログが存在しない場合は 404 を返す
      operationId: PutSymptomsId
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: 更新対象の症状ログ ID (UUID v7)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SymptomUpdateRequest'
      responses:
        '200':
          description: 症状ログの更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SymptomResponse'
        '400':
          description: パラメータ不正
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequestError'
              example:
                error: Invalid request body
                code: BAD_REQUEST
        '404':
          description: 指定 UUID の症状ログが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
              example:
                error: Symptom log not found
                code: NOT_FOUND
        '500':
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              example:
                error: Internal server error
                code: INTERNAL_SERVER_ERROR
    delete:
      summary: 症状ログを削除する
      description: |-
        - パスパラメーターで指定した UUID の症状ログを削除する
        - 削除成功時はボディなしで 204 を返す
        - 指定 UUID のログが存在しない場合は 404 を返す
      operationId: DeleteSymptomsId
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: 削除対象の症状ログ ID (UUID v7)
      responses:
        '204':
          description: 症状ログの削除成功
        '404':
          description: 指定 UUID の症状ログが存在しない
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
              example:
                error: Symptom log not found
                code: NOT_FOUND
        '500':
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              example:
                error: Internal server error
                code: INTERNAL_SERVER_ERROR
  /thresholds:
    get:
      summary: 症状が発生する花粉レベルのしきい値を取得する
      description: |-
        - 過去の症状ログと花粉レベルから、症状が発生しやすい花粉レベルの中央値をしきい値として返す
        - サンプルが不足している場合はフォールバック値 (level 3) を返し、is_estimated が true になる
      operationId: GetThreshold
      responses:
        '200':
          description: しきい値の取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThresholdResponse'
              example:
                threshold: 3
                sample_count: 12
                is_estimated: false
        '500':
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
              example:
                error: Internal server error
                code: INTERNAL_SERVER_ERROR
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
          description: サービスの稼働状態
    ErrorResponse:
      type: object
      required:
        - error
        - code
      properties:
        error:
          type: string
          description: エラー内容の説明文 (英語)
        code:
          type: string
          description: エラーコード
    InternalServerError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
      properties:
        code:
          type: string
          enum:
            - INTERNAL_SERVER_ERROR
    SeasonInfo:
      type: object
      required:
        - peak
        - characteristics
        - region
      properties:
        peak:
          type: string
          description: 'ピークシーズン (例: 2月〜4月)'
        characteristics:
          type: string
          description: 特徴・症状の傾向
        region:
          type: string
          description: 主な飛散地域
    PollenForecastItem:
      type: object
      required:
        - date
        - level
      properties:
        date:
          type: string
          format: date
          description: 予報日 (YYYY-MM-DD)
        level:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: '花粉レベル (1: 少ない / 5: 極めて多い)'
    PollenResponse:
      type: object
      required:
        - date
        - level
        - pollen_type
        - season_info
        - forecast
      properties:
        date:
          type: string
          format: date
          description: 取得日 (YYYY-MM-DD)
        level:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: '花粉レベル (1: 少ない / 2: やや多い / 3: 多い / 4: 非常に多い / 5: 極めて多い)'
        pollen_type:
          type: string
          enum:
            - CEDAR
            - CYPRESS
            - RAGWEED
            - GRASS
            - MUGWORT
          description: '現在シーズンのメイン花粉種 (CEDAR: スギ / CYPRESS: ヒノキ / RAGWEED: ブタクサ / GRASS: イネ科 / MUGWORT: ヨモギ)'
        season_info:
          $ref: '#/components/schemas/SeasonInfo'
        forecast:
          type: array
          description: 翌日以降の花粉予報 (最大 4 日分)
          items:
            $ref: '#/components/schemas/PollenForecastItem'
    BadRequestError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
      properties:
        code:
          type: string
          enum:
            - BAD_REQUEST
    StatsPeriod:
      type: string
      enum:
        - weekly
        - monthly
      description: '集計単位 (weekly: 週次 / monthly: 月次)'
    StatsItem:
      type: object
      required:
        - start_date
        - end_date
        - avg_sneezing
        - avg_runny
        - avg_itchy
        - avg_pollen_level
        - count
      properties:
        start_date:
          type: string
          format: date
          description: 集計期間の開始日 (YYYY-MM-DD)
        end_date:
          type: string
          format: date
          description: 集計期間の終了日 (YYYY-MM-DD)
        avg_sneezing:
          type: number
          format: float
          description: 期間内のくしゃみ強度の平均 (小数点第 1 位)
        avg_runny:
          type: number
          format: float
          description: 期間内の鼻水強度の平均 (小数点第 1 位)
        avg_itchy:
          type: number
          format: float
          description: 期間内の目のかゆみ強度の平均 (小数点第 1 位)
        avg_pollen_level:
          type: number
          format: float
          description: 期間内の花粉レベルの平均 (小数点第 1 位)
        count:
          type: integer
          format: int32
          description: 期間内の記録件数
    StatsResponse:
      type: object
      required:
        - period
        - items
      properties:
        period:
          $ref: '#/components/schemas/StatsPeriod'
        items:
          type: array
          items:
            $ref: '#/components/schemas/StatsItem'
    SymptomResponse:
      type: object
      required:
        - id
        - date
        - sneezing
        - runny
        - itchy
        - pollen_level
        - took_medication
        - note
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: 症状ログ ID (UUID v7)
        date:
          type: string
          format: date
          description: 記録日 (YYYY-MM-DD)
        sneezing:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
        runny:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
        itchy:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
        pollen_level:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
        took_medication:
          type: boolean
          default: false
        note:
          type: string
          default: ''
          maxLength: 200
        created_at:
          type: string
          format: date-time
          description: 作成日時 (RFC3339)
        updated_at:
          type: string
          format: date-time
          description: 最終更新日時 (RFC3339)
    SymptomsListResponse:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SymptomResponse'
        total:
          type: integer
          format: int32
          description: 総件数
    SymptomRequest:
      type: object
      required:
        - date
        - sneezing
        - runny
        - itchy
        - pollen_level
        - took_medication
        - note
      properties:
        date:
          type: string
          format: date
          description: 記録日 (YYYY-MM-DD)
        sneezing:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: くしゃみの強度 1〜5
        runny:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: 鼻水の強度 1〜5
        itchy:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: 目のかゆみの強度 1〜5
        pollen_level:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: 記録時の花粉レベル 1〜5
        took_medication:
          type: boolean
          default: false
          description: その日薬を服用したか。省略時は false として送信
        note:
          type: string
          default: ''
          maxLength: 200
          description: フリーメモ (最大 200 文字)。省略時は空文字として送信
    ConflictError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
      properties:
        code:
          type: string
          enum:
            - CONFLICT
    NotFoundError:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
      properties:
        code:
          type: string
          enum:
            - NOT_FOUND
    SymptomUpdateRequest:
      type: object
      required:
        - sneezing
        - runny
        - itchy
        - pollen_level
        - took_medication
        - note
      properties:
        sneezing:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: くしゃみの強度 1〜5
        runny:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: 鼻水の強度 1〜5
        itchy:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: 目のかゆみの強度 1〜5
        pollen_level:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: 花粉レベル 1〜5
        took_medication:
          type: boolean
          default: false
          description: その日薬を服用したか。省略時は false として送信
        note:
          type: string
          default: ''
          maxLength: 200
          description: フリーメモ (最大 200 文字)。省略時は空文字として送信
    ThresholdResponse:
      type: object
      required:
        - threshold
        - sample_count
        - is_estimated
      properties:
        threshold:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
          description: '推定しきい値の花粉レベル (1: 少ない / 5: 極めて多い)'
        sample_count:
          type: integer
          format: int32
          minimum: 0
          description: 推定に使用したサンプル数
        is_estimated:
          type: boolean
          description: サンプル不足のためフォールバック値を使用した場合 true
