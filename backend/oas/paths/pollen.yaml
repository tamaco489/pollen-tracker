get:
  summary: 指定座標の花粉レベルを取得する
  description: |-
    - 緯度・経度をもとに Google Pollen API を呼び出し、指定日の花粉レベル (1〜5) を返す
    - date を省略した場合は当日のデータを返す
    - 現在シーズンのメイン花粉種と season_info (ピーク期間・特徴・飛散地域) も合わせて返す
    - forecast には指定日の翌日以降 (最大 4 日分) の花粉予報を含む
  operationId: GetPollen
  parameters:
    - name: lat
      in: query
      required: true
      schema:
        type: number
        format: double
      description: "緯度 (例: 35.7122)"
    - name: lng
      in: query
      required: true
      schema:
        type: number
        format: double
      description: "経度 (例: 139.7811)"
    - name: date
      in: query
      required: false
      schema:
        type: string
        format: date
      description: 取得日 (YYYY-MM-DD)。省略時は当日
  responses:
    "200":
      description: 花粉レベルの取得成功
      content:
        application/json:
          schema:
            $ref: "../components/schemas/pollen.yaml#/PollenResponse"
          example:
            date: "2026-06-14"
            level: 2
            pollen_type: "GRASS"
            season_info:
              peak: "5月〜10月"
              characteristics: "くしゃみ・鼻水・目のかゆみ"
              region: "全国"
            forecast:
              - date: "2026-06-15"
                level: 3
              - date: "2026-06-16"
                level: 2
              - date: "2026-06-17"
                level: 1
              - date: "2026-06-18"
                level: 1
    "400":
      description: パラメータ不正
      content:
        application/json:
          schema:
            $ref: "../components/schemas/common.yaml#/BadRequestError"
          example:
            error: "Invalid query parameter"
            code: "BAD_REQUEST"
    "500":
      description: サーバーエラー
      content:
        application/json:
          schema:
            $ref: "../components/schemas/common.yaml#/InternalServerError"
          example:
            error: "Internal server error"
            code: "INTERNAL_SERVER_ERROR"
