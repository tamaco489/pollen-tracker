version: "2"
sql:
  - engine: "sqlite"
    queries: "../../internal/infrastructure/datastore/queries/"
    schema: "../migrations/sql/"
    gen:
      go:
        package: "gen"
        out: "../../internal/infrastructure/datastore/gen/"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false
        emit_methods_with_db_argument: true
        sql_package: "database/sql"
